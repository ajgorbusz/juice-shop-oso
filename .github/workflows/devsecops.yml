name: DevSecOps Shift-Left Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  devsecops-pipeline:
    name: Security and Deployment Pipeline
    runs-on: self-hosted

    steps:
      - name: Cleanup previous container runs
        run: |
          docker stop juice-shop-instance || true
          docker rm juice-shop-instance || true

      - name: Checkout repository
        uses: actions/checkout@v4  # To jest kluczowe: pobiera kod z GitHuba do runnera

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run Dependency Scan (SCA)
        run: |
          npm install --package-lock-only --ignore-scripts
          npm audit --audit-level=high || true

      - name: Run Static Code Analysis (SAST)
        run: |
          brew install semgrep
          semgrep scan --config=p/security-audit || true

      - name: Run Secret Scanning (Gitleaks)
        run: |
          brew install gitleaks
          gitleaks detect --source . -v || true

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/juice-shop:${{ github.sha }} \
                       -t ${{ secrets.DOCKERHUB_USERNAME }}/juice-shop:latest .

      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/juice-shop:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Deploy Container for DAST Testing
        run: |
          docker run -d -p 3000:3000 --name juice-shop-instance ${{ secrets.DOCKERHUB_USERNAME }}/juice-shop:latest
          echo "Waiting for the application to start..."
          sleep 15

      - name: Run Dynamic Application Testing (DAST)
        run: |
          docker run --rm --network="host" -v $(pwd):/zap/wrk/:rw owasp/zap2docker-stable zap-baseline.py \
            -t http://localhost:3000 \
            -r zap_report.html || true

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Verified Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/juice-shop:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/juice-shop:latest
